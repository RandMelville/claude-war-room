name: Bug Report
description: Reporte um problema com os agentes, commands ou o plugin
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar! Preencha o máximo de informações possível.

  - type: dropdown
    id: componente
    attributes:
      label: Componente Afetado
      options:
        - "Agente: Recon (Engenharia Reversa)"
        - "Agente: Scalability Architect (Escalabilidade)"
        - "Agente: Concurrency Specialist (Concorrência)"
        - "Agente: Chaos Engineer / SRE (Resiliência)"
        - "Agente: Security Auditor (Segurança)"
        - "Agente: Quality & Stability Lead (Relatório Final)"
        - "Command: /warroom"
        - "Command: /warroom-audit"
        - "Plugin / Instalação"
        - "Documentação"
        - "Outro"
    validations:
      required: true

  - type: textarea
    id: descricao
    attributes:
      label: Descrição do Problema
      description: O que aconteceu?
    validations:
      required: true

  - type: textarea
    id: esperado
    attributes:
      label: Comportamento Esperado
      description: O que deveria ter acontecido?
    validations:
      required: true

  - type: textarea
    id: reproduzir
    attributes:
      label: Passos para Reproduzir
      description: Como reproduzir o problema?
      placeholder: |
        1. Abri Claude Code no projeto X
        2. Rodei "/warroom-audit Feature Y"
        3. O agente Z produziu...
    validations:
      required: true

  - type: input
    id: modelo
    attributes:
      label: Modelo Claude Utilizado
      placeholder: "Ex: Opus, Sonnet 4"

  - type: input
    id: so
    attributes:
      label: Sistema Operacional
      placeholder: "Ex: macOS 15, Ubuntu 24.04"
